<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Assistant Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; height: 100dvh; overflow: hidden; }
        .sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 flex h-full font-sans text-slate-900">

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar absolute md:relative w-64 h-full bg-slate-900 text-white p-4 flex flex-col z-[60] -translate-x-full md:translate-x-0">
        <button onclick="newChat()" class="w-full bg-blue-600 py-3 rounded-xl font-bold mb-6 hover:bg-blue-700">New Chat</button>
        <div id="history-list" class="flex-1 overflow-y-auto space-y-2 text-sm"></div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="bg-white p-4 flex items-center justify-between border-b shrink-0 z-50">
            <div class="flex items-center gap-3">
                <button onclick="document.getElementById('sidebar').classList.toggle('-translate-x-full')" class="p-2 text-slate-600 bg-slate-100 rounded-lg">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                </button>
                <h1 id="chat-title" class="font-bold text-lg">Pixel</h1>
            </div>
            <div class="flex gap-1">
                <button id="gems-btn" class="p-2 text-indigo-600 hover:bg-indigo-50 rounded-lg"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3h12l4 6-10 12L2 9l4-6z"/></svg></button>
                <button id="settings-btn" class="p-2 text-slate-600 hover:bg-slate-100 rounded-lg"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
            </div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

        <div class="p-4 bg-white border-t shrink-0">
            <div class="flex gap-2 max-w-2xl mx-auto">
                <input id="chat-input" class="w-full bg-slate-100 rounded-full py-3 px-5 outline-none" placeholder="Message Pixel..." />
                <button id="send-btn" class="bg-blue-600 text-white p-3 rounded-full hover:bg-blue-700"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 2-7 20-4-9-9-4Z"/></svg></button>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="hidden fixed inset-0 bg-slate-900/50 z-[80] flex items-center justify-center p-4">
        <div id="settings-modal" class="hidden bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
            <h2 class="text-xl font-bold mb-4">Get API key from aistudio.google.com</h2>
            <input type="password" id="api-key-input" class="w-full p-3 border rounded-xl mb-4" placeholder="Gemini API Key..." />
            <button onclick="saveKey()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold">Save Key</button>
        </div>
        <div id="gems-modal" class="hidden bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl max-h-[80vh] overflow-y-auto">
            <h2 class="text-xl font-bold mb-4">Select Gem</h2>
            <div id="gems-list" class="grid grid-cols-2 gap-2 mb-6"></div>
            <div class="border-t pt-4">
                <h3 class="font-bold mb-2">Create Custom Gem</h3>
                <input id="new-gem-name" placeholder="Name" class="w-full p-2 border rounded-lg mb-2 text-sm" />
                <input id="new-gem-prompt" placeholder="Personality..." class="w-full p-2 border rounded-lg mb-2 text-sm" />
                <button onclick="addCustomGem()" class="w-full py-2 bg-green-600 text-white rounded-lg font-bold">Add Gem</button>
            </div>
            <button onclick="closeModals()" class="w-full py-3 bg-slate-100 rounded-xl font-bold mt-4">Close</button>
        </div>
    </div>

    <script>
        let apiKey = "", currentChatId = Date.now(), chats = { [currentChatId]: { title: "New Chat", messages: [] } };
        let gems = [{name:"Standard", prompt:"You are a helpful assistant."}, {name:"Storyteller", prompt:"You are a master storyteller."}];
        let currentGem = gems[0];

        function updateTitle() {
            const titleEl = document.getElementById('chat-title');
            titleEl.textContent = currentGem.name === "Standard" ? "Pixel" : `Pixel: ${currentGem.name} Edition`;
        }

        function closeModals() { document.getElementById('modal-overlay').classList.add('hidden'); document.getElementById('settings-modal').classList.add('hidden'); document.getElementById('gems-modal').classList.add('hidden'); }
        function saveKey() { apiKey = document.getElementById('api-key-input').value; closeModals(); }
        
        function renderGems() {
            const list = document.getElementById('gems-list'); list.innerHTML = "";
            gems.forEach(g => {
                const b = document.createElement('button');
                b.className = "bg-blue-50 border border-blue-200 p-2 rounded-lg text-xs font-bold text-blue-700";
                b.textContent = g.name;
                b.onclick = () => { currentGem = g; updateTitle(); closeModals(); };
                list.appendChild(b);
            });
        }

        function addCustomGem() {
            const name = document.getElementById('new-gem-name').value;
            const prompt = document.getElementById('new-gem-prompt').value;
            if(name && prompt) {
                gems.push({name, prompt});
                renderGems();
                document.getElementById('new-gem-name').value = "";
                document.getElementById('new-gem-prompt').value = "";
            }
        }

        document.getElementById('settings-btn').onclick = () => { document.getElementById('modal-overlay').classList.remove('hidden'); document.getElementById('settings-modal').classList.remove('hidden'); };
        document.getElementById('gems-btn').onclick = () => { document.getElementById('modal-overlay').classList.remove('hidden'); document.getElementById('gems-modal').classList.remove('hidden'); renderGems(); };

        function newChat() {
            currentChatId = Date.now();
            chats[currentChatId] = { title: "New Chat", messages: [] };
            document.getElementById('chat-container').innerHTML = "";
            renderHistory();
            if(window.innerWidth < 768) document.getElementById('sidebar').classList.add('-translate-x-full');
        }

        function renderHistory() {
            const list = document.getElementById('history-list'); list.innerHTML = "";
            Object.keys(chats).forEach(id => {
                const b = document.createElement('button');
                b.className = "w-full text-left p-3 rounded-lg hover:bg-slate-800 text-slate-300";
                b.textContent = chats[id].title;
                b.onclick = () => { currentChatId = id; loadChat(id); if(window.innerWidth < 768) document.getElementById('sidebar').classList.add('-translate-x-full'); };
                list.appendChild(b);
            });
        }

        function loadChat(id) {
            document.getElementById('chat-container').innerHTML = "";
            chats[id].messages.forEach(m => appendMessage(m.role, m.text));
        }

        function appendMessage(role, text) {
            const chat = document.getElementById('chat-container');
            chat.innerHTML += `<div class="p-3 rounded-2xl ${role==='user'?'bg-blue-600 text-white ml-auto':'bg-slate-200 text-slate-800'} max-w-[85%]">${text}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        document.getElementById('send-btn').onclick = async () => {
            const input = document.getElementById('chat-input');
            const text = input.value;
            if(!text.trim()) return;
            if(!apiKey) { document.getElementById('settings-btn').click(); return; }
            
            appendMessage('user', text);
            chats[currentChatId].messages.push({role: 'user', text});
            if(chats[currentChatId].messages.length === 1) chats[currentChatId].title = text.substring(0, 15) + "...";
            input.value = "";
            renderHistory();
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: currentGem.prompt + " User says: " + text }] }] })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                appendMessage('ai', reply);
                chats[currentChatId].messages.push({role: 'ai', text: reply});
            } catch(e) { appendMessage('ai', "Hmm, I can't reach my brain. Please check your API Key."); }
        };
        
        renderHistory();
        updateTitle();
    </script>
</body>
</html>
